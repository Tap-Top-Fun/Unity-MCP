name: make-release

on:
  push:
    branches:
      - main

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          version=$(grep '"version"' Unity-MCP-Plugin/Assets/root/package.json | head -1 | sed -E 's/.*"([0-9.]+)".*/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Find previous version tag
        id: prev_tag
        run: |
          version=${{ steps.get_version.outputs.version }}
          prev_tag=$(git tag --list --sort=-creatordate | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^$version$" | head -n 1)
          echo "prev_tag=$prev_tag" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag_exists
        run: |
          version=${{ steps.get_version.outputs.version }}
          tag_name="$version"
          if git ls-remote --tags origin | grep -q "refs/tags/$tag_name"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate release description
        id: rel_desc
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          version=${{ steps.get_version.outputs.version }}
          prev_tag=${{ steps.prev_tag.outputs.prev_tag }}
          today=$(date +'%B %e, %Y')
          echo "# Unity-MCP Version $version  " > release.md
          echo "**Released:** *$today*" >> release.md
          echo "\n---\n" >> release.md
          if [ -n "$prev_tag" ]; then
            echo "## Comparison\n" >> release.md
            echo "See every change: [Compare \\\`$prev_tag...$version\\\`](https://github.com/IvanMurzak/Unity-MCP/compare/$prev_tag...$version)\n" >> release.md
            echo "---\n" >> release.md
          fi
          echo "## Commit Summary (Newest → Oldest)\n" >> release.md
          git log --pretty=format:'- [`%h`](https://github.com/IvanMurzak/Unity-MCP/commit/%H) — %s by @%an  ' $prev_tag..HEAD >> release.md
          echo "release_body<<EOF" >> $GITHUB_ENV
          cat release.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Tag and Release
        if: steps.tag_exists.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: ${{ env.release_body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}